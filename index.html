<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#080c14"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FitTrack"/>
<link rel="manifest" href="manifest.json"/>
<title>FitTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<style>
:root{--bg:#080c14;--bg1:#0d1520;--bg2:#111b2a;--border:#141e2e;--border2:#1a2840;--text:#e2e8f0;--text2:#8aa0c0;--text3:#4a6080;--text4:#2a4060;--accent:#c8f060;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1e2a3a;border-radius:2px}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:var(--border2);outline:none;cursor:pointer;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--text);cursor:pointer;border:2px solid var(--bg)}
button{font-family:'Outfit',sans-serif;cursor:pointer}
#app-header{flex-shrink:0;padding:max(env(safe-area-inset-top),14px) 14px 0}
#app-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 14px 0}
#app-nav{flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,8px)}
.nav-bar{display:flex;background:rgba(8,12,20,.97);border-top:1px solid var(--border);padding:5px 0}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--text3);font-size:9px;font-weight:600;letter-spacing:.04em;padding:4px 2px;transition:color .15s}
.nav-btn.active{color:var(--text)}
.nav-btn i{font-size:19px}
.card{background:var(--bg1);border:1px solid var(--border);border-radius:13px;overflow:hidden;margin-bottom:9px}
.metric{background:var(--bg1);border:1px solid var(--border);border-radius:11px;padding:10px 12px;text-align:center}
.pill{padding:5px 11px;border-radius:99px;border:1px solid var(--border2);background:var(--bg1);font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.pill.active{color:#fff;border-color:transparent}
.spill{padding:4px 9px;border-radius:99px;border:1px solid var(--border);background:var(--bg1);font-size:10px;font-weight:600;color:var(--text3);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.spill.active{color:#fff;border-color:transparent}
.num-in{background:var(--bg2);border:1px solid var(--border2);color:var(--text);border-radius:7px;padding:5px 7px;font-family:'JetBrains Mono',monospace;font-size:12px;width:100%;text-align:center;transition:border-color .15s}
.num-in:focus{outline:none;border-color:var(--accent)}
.num-in:disabled{opacity:.8}
.num-in.done{color:var(--accent);border-color:var(--accent);background:#141a0a}
.btn-check{width:30px;height:30px;border-radius:7px;border:1px solid var(--border2);background:var(--bg2);color:var(--text4);font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.btn-check.done{background:var(--accent);border-color:var(--accent);color:#080c14}
.btn-primary{background:var(--accent);color:#080c14;border:none;border-radius:9px;padding:11px 18px;font-size:13px;font-weight:700;width:100%;transition:opacity .15s}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text3);border-radius:9px;padding:10px 18px;font-size:13px;width:100%;transition:all .15s}
.stat-pill{display:inline-flex;align-items:center;gap:3px;background:var(--bg);border:1px solid var(--border);border-radius:99px;padding:2px 8px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3)}
.prog-track{height:5px;background:var(--border2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .4s ease}
.task-item{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-top:1px solid var(--border)}
.task-item:first-child{border-top:none}
.task-check{width:21px;height:21px;border-radius:6px;border:1px solid var(--border2);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--bg1);transition:all .15s}
.task-check.done{background:var(--accent);border-color:var(--accent)}
.grade-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.mb-track{height:6px;background:var(--border2);border-radius:3px;overflow:hidden;margin-top:3px}
.mb-fill{height:100%;border-radius:3px;transition:width .9s cubic-bezier(.22,1,.36,1)}
.ring-track{fill:none;stroke:var(--border2);stroke-width:7}
.ring-fill{fill:none;stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.22,1,.36,1)}
.ex-lib-card{background:var(--bg1);border:1px solid var(--border);border-radius:11px;padding:10px 12px;cursor:pointer;transition:border-color .15s;margin-bottom:7px}
.ex-lib-card:hover{border-color:var(--border2)}
.ex-lib-card.active{border-color:var(--accent);border-width:1.5px}
.btn-add-day{background:transparent;border:1px dashed var(--border2);color:var(--text3);border-radius:7px;padding:4px 9px;font-size:11px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.btn-add-day.added{background:rgba(200,240,96,.1);border-color:var(--accent);color:var(--accent);border-style:solid}
#onboard{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;overflow-y:auto}
#onboard.hidden{display:none}
.ob-step{display:none;padding:22px 18px;flex-direction:column;min-height:100%}
.ob-step.active{display:flex}
.goal-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.goal-card-ob{background:var(--bg1);border:1px solid var(--border);border-radius:13px;padding:13px;cursor:pointer;transition:all .15s}
.goal-card-ob.sel{border-width:2px}
.sub-opt{background:var(--bg1);border:1px solid var(--border);border-radius:9px;padding:10px 12px;cursor:pointer;transition:all .15s;margin-bottom:7px}
.sub-opt.sel{border-color:#60a5fa;background:rgba(96,165,250,.08)}
.profile-inp{background:var(--bg2);border:1px solid var(--border2);color:var(--text);border-radius:9px;padding:9px 13px;font-family:'Outfit',sans-serif;font-size:15px;width:100%}
#toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:#1a2840;color:var(--text);border-radius:9px;padding:9px 16px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .2s ease forwards}
/* Score animations */
@keyframes floatUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-34px);opacity:0}}
.float-pt{position:absolute;font-size:12px;font-weight:700;color:var(--accent);pointer-events:none;animation:floatUp .95s ease forwards;white-space:nowrap;z-index:60}
/* Level up overlay */
#lv-overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:600;pointer-events:none;opacity:0;background:transparent;transition:background .3s,opacity .3s;max-width:480px;margin:0 auto}
#lv-overlay.show{pointer-events:all;opacity:1;background:rgba(0,0,0,.75)}
#lv-card{background:var(--bg1);border:1px solid var(--border2);border-radius:16px;padding:1.75rem 1.75rem 1.4rem;text-align:center;transform:scale(.5) translateY(80px);opacity:0;transition:transform .5s cubic-bezier(.34,1.56,.64,1),opacity .35s;min-width:240px;position:relative}
#lv-card.pop{transform:scale(1) translateY(0);opacity:1}
.lv-ring-wrap{width:82px;height:82px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;margin:0 auto .9rem;position:relative}
.lv-spinner{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;border-top-color:var(--accent);border-right-color:var(--accent);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lv-xp-wrap{height:5px;background:var(--border2);border-radius:3px;overflow:hidden;margin:.45rem 0 .3rem}
.lv-xp-fill{height:100%;border-radius:3px;background:var(--accent);width:0;transition:width 1.2s cubic-bezier(.22,1,.36,1)}
@keyframes flame{0%,100%{transform:scaleY(1) rotate(-4deg)}50%{transform:scaleY(1.12) rotate(4deg)}}
.flame{display:inline-block;animation:flame 1.3s ease infinite;transform-origin:bottom center}
/* 3D viewer */
#viewer-wrap{position:relative;width:100%;background:var(--bg);border-radius:12px;overflow:hidden;touch-action:none}
#viewer-canvas{display:block;width:100%;height:100%}
#viewer-overlay{position:absolute;inset:0;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:10px}
.view-btn{background:rgba(13,21,32,.85);border:1px solid var(--border2);border-radius:7px;padding:4px 9px;font-size:10px;font-weight:600;color:var(--text3);cursor:pointer;pointer-events:all;backdrop-filter:blur(4px);transition:all .15s}
.view-btn:hover{border-color:var(--accent);color:var(--accent)}
.phase-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);transition:background .2s,transform .2s;flex-shrink:0}
.phase-dot.active{transform:scale(1.5)}
canvas#pc{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20}
.pts-badge{margin-left:auto;flex-shrink:0;font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;background:var(--bg2);color:var(--text3);transition:background .2s,color .2s}
.pts-badge.lit{background:rgba(200,240,96,.12);color:var(--accent)}
.shimmer-line{height:1px;background:var(--border2);margin:.9rem 0;position:relative;overflow:hidden}
.shimmer-line::after{content:'';position:absolute;inset:0;background:var(--accent);transform:translateX(-100%);animation:sh .8s .3s ease forwards}
@keyframes sh{to{transform:translateX(0)}}

/* drag sort */
.drag-item{transition:opacity .15s,transform .15s}
.drag-item.dragging{opacity:.4;transform:scale(.97)}
.drag-item.drag-over{border-color:var(--accent)!important;border-style:dashed!important}
.drag-handle{cursor:grab;color:var(--text4);font-size:16px;padding:0 4px;flex-shrink:0;touch-action:none}
.drag-handle:active{cursor:grabbing}
</style>
</head>
<body>

<!-- ===============================================================
     ONBOARDING
================================================================ -->
<div id="onboard">
  <div class="ob-step active" id="ob0" style="align-items:center;justify-content:center;text-align:center;gap:22px">
    <div style="font-size:50px">🏋️</div>
    <div><div style="font-size:26px;font-weight:800;letter-spacing:-.02em">FitTrack</div><div style="font-size:13px;color:var(--text3);margin-top:5px">Your personal fitness companion</div></div>
    <div style="display:flex;gap:11px;width:100%;max-width:270px">
      <button onclick="setLang('zh')" style="flex:1;background:var(--accent);color:#080c14;border:none;border-radius:11px;padding:13px;font-size:15px;font-weight:700">繁體中文</button>
      <button onclick="setLang('en')" style="flex:1;background:var(--bg1);color:var(--text);border:1px solid var(--border2);border-radius:11px;padding:13px;font-size:15px;font-weight:600">English</button>
    </div>
  </div>
  <div class="ob-step" id="ob1">
    <div style="font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:5px" id="ob1-sl">Step 1 of 3</div>
    <div style="font-size:21px;font-weight:800;margin-bottom:3px" id="ob1-t">What's your goal?</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:16px" id="ob1-s">Choose the goal that fits you best</div>
    <div class="goal-grid" id="goal-grid"></div>
    <div style="margin-top:auto;padding-top:14px;display:flex;gap:9px">
      <button class="btn-ghost" onclick="obBack()" style="flex:0 0 auto;width:auto;padding:10px 16px" id="ob-bk">Back</button>
      <button class="btn-primary" id="ob1-next" onclick="obGoalNext()" disabled>Next →</button>
    </div>
  </div>
  <div class="ob-step" id="ob2">
    <div style="font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:5px" id="ob2-sl">Step 2 of 3</div>
    <div style="font-size:21px;font-weight:800;margin-bottom:16px" id="ob2-q"></div>
    <div id="ob2-body"></div>
    <div style="margin-top:auto;padding-top:14px;display:flex;gap:9px">
      <button class="btn-ghost" onclick="obBack()" style="flex:0 0 auto;width:auto;padding:10px 16px">← Back</button>
      <button class="btn-primary" id="ob2-next" onclick="obQNext()">Next →</button>
    </div>
  </div>
  <div class="ob-step" id="ob3">
    <div style="font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:5px" id="ob3-sl">Step 3 of 3</div>
    <div style="font-size:21px;font-weight:800;margin-bottom:3px" id="ob3-t">Your body stats</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:16px" id="ob3-s">Used to personalise your plan</div>
    <div style="display:grid;gap:12px;margin-bottom:16px">
      <div><div style="font-size:11px;color:var(--text3);font-weight:600;margin-bottom:5px" id="lw">Weight (kg)</div><input class="profile-inp" type="number" id="inp-weight" value="75" min="30" max="200" step="0.1"/></div>
      <div><div style="font-size:11px;color:var(--text3);font-weight:600;margin-bottom:5px" id="lh">Height (cm)</div><input class="profile-inp" type="number" id="inp-height" value="170" min="140" max="220" step="1"/></div>
      <div><div style="font-size:11px;color:var(--text3);font-weight:600;margin-bottom:5px" id="la">Age</div><input class="profile-inp" type="number" id="inp-age" value="28" min="15" max="80" step="1"/></div>
      <div><div style="font-size:11px;color:var(--text3);font-weight:600;margin-bottom:5px" id="lg">Goal weight (kg)</div><input class="profile-inp" type="number" id="inp-goalwt" value="70" min="30" max="200" step="0.5"/></div>
    </div>
    <div style="margin-top:auto;display:flex;gap:9px">
      <button class="btn-ghost" onclick="obBack()" style="flex:0 0 auto;width:auto;padding:10px 16px">← Back</button>
      <button class="btn-primary" onclick="finishOnboard()" id="ob3-btn">Start tracking →</button>
    </div>
  </div>
</div>

<!-- ===============================================================
     MAIN APP
================================================================ -->
<div id="app" style="display:none;flex:1;flex-direction:column;overflow:hidden">
  <div id="app-header"></div>
  <div id="app-content" class="fade-up"></div>
  <div id="app-nav"><div class="nav-bar" id="nav-bar"></div></div>
</div>

<!-- Level-up overlay (outside app so it covers everything) -->
<canvas id="pc"></canvas>
<div id="lv-overlay">
  <div id="lv-card">
    <div class="lv-ring-wrap">
      <div class="lv-spinner"></div>
      <div><div style="font-size:1.8rem;font-weight:800;color:var(--accent)" id="lv-num">12</div><div style="font-size:8px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase">Level</div></div>
    </div>
    <div style="font-size:1rem;font-weight:700;margin-bottom:.2rem" id="lv-title">Level Up!</div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:.5rem" id="lv-sub">You reached a new level</div>
    <div class="shimmer-line"></div>
    <div style="font-size:9px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.3rem">Next level XP</div>
    <div class="lv-xp-wrap"><div class="lv-xp-fill" id="lv-xp-bar"></div></div>
    <div style="font-size:9px;color:var(--text3)" id="lv-xp-lbl">0 / 500 XP</div>
    <button onclick="dismissLvl()" style="margin-top:1rem;width:100%;background:var(--accent);color:#080c14;border:none;border-radius:8px;padding:10px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer">Continue →</button>
  </div>
</div>
<div id="toast"></div>

<script>
// =============== DB / PERSISTENCE ===============
const DB={
  get:(k,d)=>{try{const v=localStorage.getItem('ft_'+k);return v!=null?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem('ft_'+k,JSON.stringify(v));}catch{}}
};
// =============== CONSTANTS ===============
const SCORE_CFG={set_done:5,task_done:10,pr_broken:25,workout_saved:15};
const LEVEL_XP=500;
const MUSCLE_MAP={
  chest:{color:'#ec4899',label:{zh:'胸部',en:'Chest'},target:75},
  back:{color:'#06b6d4',label:{zh:'背部',en:'Back'},target:75},
  legs:{color:'#22c55e',label:{zh:'腿部',en:'Legs'},target:75},
  shoulders:{color:'#a855f7',label:{zh:'肩膀',en:'Shoulders'},target:50},
  arms:{color:'#f97316',label:{zh:'手臂',en:'Arms'},target:50},
  core:{color:'#eab308',label:{zh:'核心',en:'Core'},target:25},
  cardio:{color:'#f87171',label:{zh:'有氧',en:'Cardio'},target:50},
};
const PC={Mon:'#f97316',Tue:'#a855f7',Wed:'#ec4899',Thu:'#06b6d4',Fri:'#22c55e',Sat:'#94a3b8',Sun:'#475569'};
const PL={Mon:{zh:'手臂日',en:'Arms'},Tue:{zh:'肩膀日',en:'Shoulders'},Wed:{zh:'胸部日',en:'Chest'},Thu:{zh:'背部日',en:'Back'},Fri:{zh:'腿部日',en:'Legs'},Sat:{zh:'休息日',en:'Rest'},Sun:{zh:'休息日',en:'Rest'}};
const WD=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DEFAULT_PLAN={
  Mon:[{id:'warmup',sets:1,reps:'5'},{id:'bb_curl',sets:5,reps:15},{id:'hammer',sets:5,reps:15},{id:'cable_pd',sets:5,reps:15},{id:'skull',sets:5,reps:15},{id:'cardio30',sets:1,reps:'30'}],
  Tue:[{id:'warmup',sets:1,reps:'5'},{id:'db_press',sets:5,reps:15},{id:'lat_raise',sets:5,reps:15},{id:'rev_fly',sets:5,reps:15},{id:'cardio30',sets:1,reps:'30'}],
  Wed:[{id:'warmup',sets:1,reps:'5'},{id:'inc_db',sets:5,reps:15},{id:'inc_mach',sets:5,reps:15},{id:'pec_deck',sets:5,reps:15},{id:'cardio30',sets:1,reps:'30'}],
  Thu:[{id:'warmup',sets:1,reps:'5'},{id:'lat_pd',sets:5,reps:15},{id:'vbar_pd',sets:5,reps:15},{id:'sit_row',sets:5,reps:15},{id:'db_row',sets:5,reps:15},{id:'cardio30',sets:1,reps:'30'}],
  Fri:[{id:'warmup',sets:1,reps:'5'},{id:'squat',sets:5,reps:15},{id:'calf',sets:5,reps:15},{id:'leg_press',sets:5,reps:15},{id:'leg_curl',sets:5,reps:15},{id:'adductor',sets:5,reps:15},{id:'cardio30',sets:1,reps:'30'}],
  Sat:[],Sun:[]
};
const EX={
  warmup:{zh:'熱身有氧',en:'Warm-up Cardio',isCardio:true,muscle:'cardio'},
  cardio30:{zh:'有氧 (9度5速)',en:'Cardio (Incline 9)',isCardio:true,muscle:'cardio'},
  bb_curl:{zh:'槓鈴彎舉',en:'Barbell Curl',muscle:'arms',lib:'curl'},
  hammer:{zh:'啞鈴錘式彎舉',en:'Hammer Curl',muscle:'arms',lib:'ohp'},
  cable_pd:{zh:'滑輪下壓',en:'Cable Pushdown',muscle:'arms'},
  skull:{zh:'仰臥三頭肌伸展',en:'Skull Crusher',muscle:'arms',lib:'row'},
  db_press:{zh:'啞鈴肩推',en:'DB Shoulder Press',muscle:'shoulders',lib:'ohp'},
  lat_raise:{zh:'啞鈴側平舉',en:'Lateral Raise',muscle:'shoulders'},
  rev_fly:{zh:'坐姿反向飛鳥',en:'Reverse Fly',muscle:'shoulders'},
  inc_db:{zh:'啞鈴臥推45度',en:'Incline DB Press',muscle:'chest',lib:'curl'},
  inc_mach:{zh:'上斜胸推機',en:'Incline Press Machine',muscle:'chest'},
  pec_deck:{zh:'蝴蝶機夾胸',en:'Pec Deck Fly',muscle:'chest'},
  lat_pd:{zh:'滑輪下拉',en:'Lat Pulldown',muscle:'back',lib:'curl'},
  vbar_pd:{zh:'滑輪下拉V-Bar',en:'V-Bar Pulldown',muscle:'back'},
  sit_row:{zh:'坐姿划船',en:'Seated Cable Row',muscle:'back',lib:'row'},
  db_row:{zh:'單臂俯馬划船',en:'Single-Arm Row',muscle:'back'},

// =============== SCORING ===============
function chkWeek(){
  const now=new Date(),mon=new Date(now);
  mon.setDate(now.getDate()-((now.getDay()+6)%7));mon.setHours(0,0,0,0);
  const wk=mon.toISOString().slice(0,10);
  if(S.scores.weekStart!==wk){
    const h=S.scores.history||[];
    if(S.scores.weekly>0)h.unshift({week:S.scores.weekStart||wk,score:S.scores.weekly,breakdown:{...S.scores.breakdown}});
    S.scores={total:S.scores.total||0,weekly:0,weekStart:wk,breakdown:{},history:h.slice(0,12)};
    sv('scores');
  }
}
function addPts(type,muscle){
  chkWeek();
  const pts=SCORE_CFG[type]||0;if(!pts)return pts;
  S.scores.total=(S.scores.total||0)+pts;
  S.scores.weekly=(S.scores.weekly||0)+pts;
  if(muscle){S.scores.breakdown=S.scores.breakdown||{};S.scores.breakdown[muscle]=(S.scores.breakdown[muscle]||0)+pts;}
  sv('scores');return pts;
}
function grade(pct){
  if(pct>=90)return{g:'S',c:'#fbbf24',bg:'rgba(251,191,36,.15)'};
  if(pct>=70)return{g:'A',c:'#4ade80',bg:'rgba(74,222,128,.15)'};
  if(pct>=50)return{g:'B',c:'#60a5fa',bg:'rgba(96,165,250,.15)'};
  if(pct>=30)return{g:'C',c:'#f97316',bg:'rgba(249,115,22,.15)'};
  return{g:'D',c:'#f87171',bg:'rgba(248,113,113,.15)'};
}
function getLevelXP(){const lvl=Math.floor(S.scores.total/LEVEL_XP);const xpInLevel=S.scores.total%LEVEL_XP;return{level:lvl+1,xp:xpInLevel,pct:Math.round(xpInLevel/LEVEL_XP*100)};}

// =============== HELPERS ===============
function calcBMI(w,h){return +((w)/((h/100)**2)).toFixed(1);}
function bmiLbl(b){if(b<18.5)return{zh:'過輕',en:'Underweight',c:'#60a5fa'};if(b<23)return{zh:'正常',en:'Normal',c:'#4ade80'};if(b<27.5)return{zh:'過重',en:'Overweight',c:'#facc15'};return{zh:'肥胖',en:'Obese',c:'#f87171'};}
function tdee(w,h,a){return Math.round((10*w+6.25*h-5*a+5)*1.55);}
function strLvl(id,w,bw){const s=STD[id];if(!s||!w||!bw)return null;const r=w/bw,ls=[t('新手','Beginner'),t('初級','Novice'),t('中級','Intermediate'),t('高級','Advanced')],cs=['#94a3b8','#60a5fa','#a78bfa','#4ade80'];if(r<s[0])return{l:ls[0],next:s[0],c:cs[0],p:Math.round(r/s[0]*100)};if(r<s[1])return{l:ls[1],next:s[1],c:cs[1],p:Math.round((r-s[0])/(s[1]-s[0])*100)};if(r<s[2])return{l:ls[2],next:s[2],c:cs[2],p:Math.round((r-s[1])/(s[2]-s[1])*100)};return{l:ls[3],next:null,c:cs[3],p:100};}
function dSets(day){let d=0,tot=0;Object.values(S.logs[day]||{}).forEach(sets=>{if(!Array.isArray(sets))return;sets.forEach(s=>{tot++;if(s.done)d++;});});return{done:d,total:tot};}
function getPR(id){const pts=[];S.history.forEach(s=>{const sets=s.sets&&s.sets[id];if(!sets)return;const mw=Math.max(...sets.map(s=>parseFloat(s.weight)||0));if(mw>0)pts.push({date:s.date,weight:mw});});pts.sort((a,b)=>a.date.localeCompare(b.date));let run=0;return pts.map(p=>{const isPR=p.weight>run;if(isPR)run=p.weight;return{...p,isPR};});}
function genTasks(gId,ans,profile){

    else if(gId==='build_muscle'){const gym=parseInt(ans.gym_days||4);const gi=gym>=5?[0,1,2,3,4]:gym===4?[0,1,3,4]:gym===3?[0,2,4]:[0,3];const sp=[t('胸部','Chest'),t('背部','Back'),t('腿部','Legs'),t('肩膀','Shoulders'),t('手臂','Arms')];const gs=gi.indexOf(i);if(gs>=0){dt.push({icon:'ti-barbell',zh:`力量訓練—${sp[gs%sp.length]}`,en:`Train—${sp[gs%sp.length]}`,type:'strength',pts:15});dt.push({icon:'ti-run',zh:'熱身10分鐘',en:'Warm-up 10 min',type:'cardio',pts:5});}else dt.push({icon:'ti-zzz',zh:'主動恢復',en:'Active recovery',type:'rest',pts:5});dt.push({icon:'ti-salad',zh:`蛋白質${Math.round(w*2.0)}g`,en:`Protein ${Math.round(w*2.0)}g`,type:'diet',pts:5});dt.push({icon:'ti-clipboard-list',zh:`卡路里${td+400}kcal`,en:`Calories ${td+400}kcal`,type:'diet',pts:5});if(i===6)dt.push({icon:'ti-ruler',zh:'量體圍記錄',en:'Measure body',type:'track',pts:8});}
    else{if(i<5)dt.push({icon:'ti-activity',zh:'運動30分鐘',en:'Exercise 30 min',type:'cardio',pts:10});else dt.push({icon:'ti-zzz',zh:'休息',en:'Rest',type:'rest',pts:3});dt.push({icon:'ti-droplet',zh:`飲水${(w*0.033).toFixed(1)}L`,en:`Drink ${(w*0.033).toFixed(1)}L`,type:'habit',pts:5});dt.push({icon:'ti-salad',zh:'5份蔬菜水果',en:'5 portions fruit & veg',type:'diet',pts:5});if(i===6)dt.push({icon:'ti-scale',zh:'量體重',en:'Weigh in',type:'track',pts:5});}
    tasks[i]=dt;
  }
  return tasks;
}

const cv=document.getElementById('pc');
const cx2=cv&&cv.getContext('2d');
let parts=[];
function resizePc(){if(!cv)return;cv.style.width='100%';cv.style.height='100%';cv.width=window.innerWidth;cv.height=window.innerHeight;}
function spawnParts(x,y,color,n){if(!cx2)return;
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*6;parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2.5,sz:2.5+Math.random()*4,color,life:1,dec:.014+Math.random()*.011});}
  animParts();
}
function animParts(){if(!cx2)return;
  cx2.clearRect(0,0,cv.width,cv.height);
  parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.13;p.life-=p.dec;cx2.globalAlpha=Math.max(0,p.life);cx2.fillStyle=p.color;cx2.beginPath();cx2.arc(p.x,p.y,p.sz,0,Math.PI*2);cx2.fill();return p.life>0;});
  cx2.globalAlpha=1;if(parts.length)requestAnimationFrame(animParts);
}
function burstConfetti(){resizePc();const bx=window.innerWidth/2,by=window.innerHeight*.35;const cols=['#c8f060','#4ade80','#60a5fa','#fbbf24','#f97316','#ec4899','#a78bfa','#fff'];
  for(let i=0;i<65;i++){const a=Math.random()*Math.PI*2,s=3+Math.random()*9,color=cols[Math.floor(Math.random()*cols.length)];parts.push({x:bx,y:by,vx:Math.cos(a)*s,vy:Math.sin(a)*s-5,sz:3+Math.random()*5,color,life:1,dec:.009+Math.random()*.007});}
  animParts();
}

function togSet(el){

function togExInPlan(exId,day){
  if(!S.customPlan[day])S.customPlan[day]=[];
  const idx=S.customPlan[day].findIndex(e=>e.id===exId);
  if(idx>=0){
    S.customPlan[day].splice(idx,1);
    toast(t('已從 '+day+' 移除','Removed from '+day));
  }else{
    // For cardio exercises, default reps to 30; strength to 12
    const ex=EX[exId]||LIB.find(e=>e.id===exId);
    const isCardio=ex&&ex.isCardio;
    S.customPlan[day].push({id:exId,sets:isCardio?1:3,reps:isCardio?30:12});
    ensLogs();
    toast(t('已加入 '+day,'Added to '+day));
  }
  sv('customPlan','logs');
  // Only update the day buttons — don't collapse the card
  const container=document.getElementById('app-content');
  if(container){
    // Update all .btn-add-day buttons for this exercise
    container.querySelectorAll('.btn-add-day[data-ex="'+exId+'"]').forEach(btn=>{
      const btnDay=btn.dataset.day;

}

  const keys=EX3D[exKey]?.keys||EX3D.squat.keys;
  for(let i=0;i<keys.length-1;i++){if(t>=keys[i].t&&t<=keys[i+1].t){const local=(t-keys[i].t)/(keys[i+1].t-keys[i].t);const e=easeInOut(local);return{hip:lerp(keys[i].hip,keys[i+1].hip,e),torso:lerp(keys[i].torso,keys[i+1].torso,e),arm:lerp(keys[i].arm,keys[i+1].arm,e),phaseIdx:i};}}
  return{hip:0,torso:0,arm:0,phaseIdx:0};
}

// =============== DRAG-TO-REORDER ===============
let dragIdx=null,dragDay=null;
function dragStart(e){
  dragIdx=parseInt(e.currentTarget.dataset.idx);
  dragDay=e.currentTarget.dataset.day;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
}
function dragOver(e){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.drag-item.drag-over').forEach(el=>el.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}
function dragDrop(e){
  e.preventDefault();
  const toIdx=parseInt(e.currentTarget.dataset.idx);
  const toDay=e.currentTarget.dataset.day;
  document.querySelectorAll('.drag-item').forEach(el=>{el.classList.remove('dragging','drag-over');});
  if(dragIdx===null||dragIdx===toIdx||dragDay!==toDay)return;
  const plan=S.customPlan[dragDay];
  const [moved]=plan.splice(dragIdx,1);
  plan.splice(toIdx,0,moved);
  sv('customPlan');rContent();
}
function removeFromPlan(el){var day,idx;if(typeof el==='object'&&el.dataset){day=el.dataset.day;idx=parseInt(el.dataset.idx);}else{day=arguments[0];idx=arguments[1];}
  S.customPlan[day].splice(idx,1);
  sv('customPlan','logs');rContent();
  toast(t('已移除','Removed'));
}
function moveEx(el){var day=el.dataset.day,idx=parseInt(el.dataset.idx),dir=parseInt(el.dataset.dir);
  const plan=S.customPlan[day];
  const to=idx+dir;
  if(to<0||to>=plan.length)return;
  const [item]=plan.splice(idx,1);
  plan.splice(to,0,item);
  sv('customPlan');rContent();
}
function adjCardio(el,delta){
  var day=el.dataset.day,id=el.dataset.id;
  var plan=S.customPlan[day];
  var entry=plan.find(function(e){return e.id===id;});
  if(!entry)return;
  var cur=parseInt(entry.reps)||30;
  entry.reps=Math.max(5,Math.min(180,cur+delta));
  sv('customPlan');rContent();
}
function setCardioReps(el){
  var day=el.dataset.day,id=el.dataset.id;
  var plan=S.customPlan[day];
  var entry=plan.find(function(e){return e.id===id;});
  if(!entry)return;
  entry.reps=Math.max(5,Math.min(180,parseInt(el.value)||30));
  sv('customPlan');
}
function togCardio(el){

    var day=el.dataset.day,exId=el.dataset.id;
    if(!day||!exId){console.warn('togCardio: missing data',el.dataset);return;}
    if(!S.logs[day])S.logs[day]={};
    const key='__cardio__'+exId;
    const wasDone=!!S.logs[day][key];
    if(!wasDone){
      S.logs[day][key]=true;
      const pts=addPts('set_done','cardio');
      toast('+'+pts+' pts');
      startTimer(S.timerMax);
      const prevLvl=Math.floor((S.scores.total-pts)/LEVEL_XP);
      if(Math.floor(S.scores.total/LEVEL_XP)>prevLvl)
        setTimeout(()=>showLvlUp(t('升級！','Level Up!'),t('你越來越強！','Getting stronger!'),true),600);
    }else{
      S.logs[day][key]=false;
    }
    sv('logs');rContent();rHdr();
  }catch(err){console.error('togCardio error:',err);toast('Error: '+err.message);}
}

// =============== INIT ===============
ensLogs();chkWeek();
if(DB.get('goalId',null)&&DB.get('profile',null)){
  document.getElementById('onboard').classList.add('hidden');
  const app=document.getElementById('app');app.style.display='flex';app.style.flexDirection='column';
  renderApp();
}else{updObT();}
</script>
